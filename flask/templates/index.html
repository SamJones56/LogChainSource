<!DOCTYPE html>
<!-- https://www.w3schools.com/bootstrap/bootstrap_get_started.asp -->
<!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<!-- jQuery library -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<!-- Latest compiled JavaScript -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<html>
<head>
    <title>LogChain</title>
</head>
<body>
    <h1>Logs</h1>
    <form method="get" class="form-inline" style="margin-bottom: 20px;">
        <div class="form-group">
            <label for="filter">Filter:</label>
            <input type="text" class="form-control" id="filter" name="filter" placeholder="Enter keyword...">
        </div>
        <button type="submit" class="btn btn-primary">Apply</button>
    </form>
    <table class="table">
        <tr>
            <!-- https://medium.com/@junpyoo50/transforming-json-input-into-html-table-view-with-flask-and-jinja-a-step-by-step-guide-1d62e2fa49ed -->
            {% for key in keys %}
                <th>{{ key }}</th>
            {% endfor %}
        </tr>
        {% for log in logs %}
            <tr>
                {% for key in keys %}
                    <td> {{ log[key]}}</td>
                {% endfor %}
            </tr>
        {% endfor %}
    </table>
</body>
</html>
